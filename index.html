<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Insight</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #eef2f5;
      --surface: #ffffff;
      --surface-soft: #f8fafb;
      --text: #1f2a37;
      --muted: #5f6b7a;
      --accent: #2f5d73;
      --accent-soft: #dce8ee;
      --border: #d6dde3;
      --shadow: 0 10px 30px rgba(31, 42, 55, 0.08);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #f4f7f9 0%, #e9eef2 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 40px;
      border-bottom: 1px solid rgba(214, 221, 227, 0.8);
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--accent);
      margin: 0;
    }

    .brand-subtitle {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status-pill {
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      border: 1px solid rgba(47, 93, 115, 0.12);
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    .workspace {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .hero-panel {
      text-align: center;
      padding: 12px 24px 0;
    }

    .hero-panel h2 {
      margin: 0 0 10px;
      font-family: 'Libre Baskerville', serif;
      font-size: 34px;
      font-weight: 400;
      color: #243746;
    }

    .hero-panel p {
      margin: 0 auto;
      max-width: 700px;
      font-size: 16px;
      line-height: 1.7;
      color: var(--muted);
    }

    .transcript-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .transcript-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px;
      background: var(--surface-soft);
      border-bottom: 1px solid var(--border);
    }

    .transcript-title {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .transcript-meta {
      font-size: 13px;
      color: var(--muted);
    }

    #transcript {
      min-height: 460px;
      max-height: 65vh;
      overflow-y: auto;
      padding: 28px 30px;
      background: #fcfdfd;
      color: #22313d;
      font-size: 16px;
      line-height: 1.9;
      white-space: pre-line;
    }

    #transcript:empty::before {
      content: "Waiting for transcript data...";
      color: #7a8794;
    }

    .footer-note {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      padding-top: 6px;
    }

    @media (max-width: 720px) {
      .topbar {
        padding: 18px 20px;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .brand-title {
        font-size: 26px;
      }

      .hero-panel h2 {
        font-size: 28px;
      }

      #transcript {
        padding: 22px 18px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1 class="brand-title">Insight</h1>
        <div class="brand-subtitle">Clinical Transcript Review</div>
      </div>
      <div id="status" class="status-pill">Connecting...</div>
    </header>

    <main class="main">
      <section class="workspace">
        <div class="hero-panel">
          <h2>Scribe</h2>
          <p>
            A calm, focused workspace for reviewing live conversational transcripts with clarity and minimal distraction.
          </p>
        </div>

        <div class="transcript-card">
          <div class="transcript-header">
            <h3 class="transcript-title">Session Transcript</h3>
            <div id="debug" class="transcript-meta">Awaiting connection</div>
          </div>
          <div id="transcript"></div>
        </div>

        <div class="footer-note">
          Insight live transcript monitor
        </div>
      </section>
    </main>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const transcriptEl = document.getElementById('transcript');
    const debugEl = document.getElementById('debug');

    const wsUrl = 'wss://' + location.host + '/ws';
    const ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      statusEl.textContent = 'Connected';
      debugEl.textContent = 'Live connection active';
    };

    ws.onclose = (e) => {
      statusEl.textContent = `Disconnected (${e.code})`;
      debugEl.textContent = 'Connection closed';
    };

    ws.onerror = (err) => {
      console.error('WebSocket error:', err);
      statusEl.textContent = 'Connection failed';
      debugEl.textContent = 'WebSocket error';
    };

    ws.onmessage = (event) => {
      console.log('Raw WS message:', event.data);
      debugEl.textContent = `Updated at ${new Date().toLocaleTimeString()}`;

      try {
        const data = JSON.parse(event.data);
        let text = '';

        if (Array.isArray(data)) {
          data.forEach(item => {
            if (typeof item === 'string') {
              text += item + '\\n';
            } else if (item && item.text) {
              const speaker = item.speaker ? `[${item.speaker}] ` : '';
              text += speaker + item.text + '\\n';
            } else {
              text += JSON.stringify(item, null, 2) + '\\n\\n';
            }
          });
        } else if (data && data.segments && Array.isArray(data.segments)) {
          data.segments.forEach(seg => {
            const speaker = seg.speaker ? `[${seg.speaker}] ` : '';
            text += speaker + (seg.text || '') + '\\n';
          });
        } else {
          text = JSON.stringify(data, null, 2);
        }
        // convert literal "\n" sequences into real newlines
        text = text.replace(/\\n/g, '\n');

        // escape HTML then convert newlines to <br>
        const escapeHtml = str => str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        transcriptEl.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');

        transcriptEl.scrollTop = transcriptEl.scrollHeight;
        //transcriptEl.textContent = text;
      } catch (e) {
        console.error('JSON parse error:', e);
      }
    };
  </script>
</body>
</html>
